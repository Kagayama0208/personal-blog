# Optional: requires metrics-server installed on the cluster.
# Safe to autoscale because pods are stateless (media on S3, DB on CNPG).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payload-blog
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payload-blog
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
