metadata:
  name: payload-blog-secrets
  namespace: payload-blog
type: Opaque
stringData:
  PAYLOAD_SECRET: 'REPLACE_ME_strong_random' # rotating invalidates all admin sessions/JWTs
  CRON_SECRET: 'REPLACE_ME_strong_random'
  PREVIEW_SECRET: 'REPLACE_ME_strong_random'
  S3_ACCESS_KEY_ID: 'REPLACE_ME'
