# TEMPLATE ONLY — do NOT commit real values and do NOT add this to kustomization.
# Apply real secrets via SealedSecrets / External Secrets Operator instead.
#
# Required Secrets in the payload-blog namespace:
#
# 1) payload-blog-secrets  — app + migrate Job env (referenced via envFrom/secretKeyRef)
# 2) regcred               — private registry pull secret (kubernetes.io/dockerconfigjson)
#                            create with: kubectl create secret docker-registry regcred \
#                              --docker-server=registry.example.internal \
#                              --docker-username=<user> --docker-password=<pass> -n payload-blog
# 3) payload-pg-app        — auto-generated by CloudNativePG (do NOT create manually)
#
# NOTE: no cloudflared token here — exposure uses the SHARED Cloudflare Tunnel in
# the `cloudflare` namespace (managed outside this project).
---
